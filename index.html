<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>BTC Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* Guaranteed fallback if Google Fonts blocked */
@import url('data:text/css,');
</style>
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #F5D56E;
    --gold-dark: #A07C10;
    --black: #000000;
    --black-soft: #0A0A0A;
    --black-card: #111111;
    --white: #FFFFFF;
    --green: #88DD44;
    --f-display: 'Orbitron', 'Courier New', 'Courier', monospace;
    --f-body:    'Cairo', 'Segoe UI', Arial, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--black);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--f-body);
    overflow: hidden;
  }

  /* Particles */
  .bg-particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle {
    position:absolute; border-radius:50%;
    background:var(--gold); animation:float-particle linear infinite; opacity:0;
  }
  @keyframes float-particle {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:0.6; }
    90%  { opacity:0.3; }
    100% { transform:translateY(-20px) scale(1.5); opacity:0; }
  }

  /* App */
  .app {
    position:relative; z-index:1;
    width:100%; max-width:420px; min-height:100vh;
    background:var(--black-soft);
    display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 0 60px rgba(212,175,55,0.15);
  }

  /* Scanline */
  .scanline {
    position:absolute; top:0; left:0; right:0; height:2px; z-index:10;
    background:linear-gradient(90deg,transparent,rgba(212,175,55,0.3),transparent);
    animation:scan 4s linear infinite; pointer-events:none;
  }
  @keyframes scan { 0%{top:0;} 100%{top:100%;} }

  /* Header */
  .header { padding:18px 20px 12px; text-align:center; position:relative; }
  .header::after {
    content:''; position:absolute; bottom:0; left:20%; right:20%;
    height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  .app-title {
    font-family:var(--f-display); font-size:22px; font-weight:900; letter-spacing:3px;
    background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-light),var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 0 8px rgba(212,175,55,0.5));
    animation:title-shimmer 3s ease-in-out infinite;
  }
  @keyframes title-shimmer {
    0%,100% { filter:drop-shadow(0 0 8px rgba(212,175,55,0.5)); }
    50%      { filter:drop-shadow(0 0 22px rgba(212,175,55,0.95)); }
  }

  /* Display */
  .display-wrap { padding:10px 16px 6px; }
  .display {
    background:var(--black); border:1px solid rgba(212,175,55,0.2);
    border-radius:16px; padding:12px 18px; min-height:86px;
    display:flex; flex-direction:column; justify-content:flex-end; align-items:flex-end;
    position:relative; overflow:hidden;
    box-shadow:inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px rgba(212,175,55,0.05);
  }
  .display::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(212,175,55,0.4),transparent);
  }
  .display-expr { font-size:12px; color:rgba(212,175,55,0.5); font-family:var(--f-display); min-height:18px; text-align:right; word-break:break-all; }
  .display-num {
    font-family:var(--f-display); font-size:36px; font-weight:700;
    color:var(--gold); text-align:right; word-break:break-all; line-height:1.1;
    text-shadow:0 0 20px rgba(212,175,55,0.4);
  }
  .display-num.pop { animation:num-pop 0.15s ease-out; }
  @keyframes num-pop { 0%{transform:scale(1.08);} 100%{transform:scale(1);} }
  .display-num.result-anim { animation:result-flash 0.4s ease-out; }
  @keyframes result-flash {
    0%   { color:var(--gold-light); text-shadow:0 0 40px rgba(212,175,55,1); transform:scale(1.05); }
    100% { color:var(--gold);       text-shadow:0 0 20px rgba(212,175,55,0.4); transform:scale(1); }
  }

  /* Special Row — 4 buttons */
  .special-row {
    padding:8px 16px 4px;
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  }
  .special-btn {
    background:linear-gradient(135deg,#1A1200,#2A1F00,#1A1200);
    border:1px solid var(--gold-dark); border-radius:12px;
    color:var(--gold); font-family:var(--f-display);
    font-size:10px; font-weight:700; letter-spacing:0.5px;
    padding:10px 4px; cursor:pointer; transition:all 0.2s;
    position:relative; overflow:hidden; line-height:1.3;
    box-shadow:0 2px 10px rgba(212,175,55,0.1), inset 0 1px 0 rgba(212,175,55,0.1);
  }
  .special-btn.gt-btn {
    background:linear-gradient(135deg,#0A1A00,#142800,#0A1A00);
    border-color:#4A7A10; color:var(--green);
  }
  .special-btn:active { transform:scale(0.93); box-shadow:0 0 18px rgba(212,175,55,0.45); }

  /* Keypad */
  .keypad { padding:4px 16px 14px; display:grid; grid-template-columns:repeat(4,1fr); gap:9px; flex:1; }
  .btn {
    aspect-ratio:1; border-radius:14px; border:none; cursor:pointer;
    font-family:var(--f-display); font-weight:700; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden; transition:transform 0.1s, box-shadow 0.2s;
    -webkit-user-select:none; user-select:none;
  }
  .btn::after { content:''; position:absolute; inset:0; background:radial-gradient(circle at center,rgba(255,255,255,0.15) 0%,transparent 70%); opacity:0; transition:opacity 0.2s; }
  .btn:active { transform:scale(0.91); }
  .btn:active::after { opacity:1; }

  .btn-num  { background:linear-gradient(145deg,#1E1E1E,#141414); color:var(--white); box-shadow:4px 4px 10px #000,-1px -1px 6px #2a2a2a,inset 0 1px 0 rgba(255,255,255,0.05); }
  .btn-zero { aspect-ratio:auto; border-radius:14px; grid-column:span 2; justify-content:center; padding-left:0; font-size:20px; }
  .btn-op   { background:linear-gradient(145deg,#2A1F00,#1A1200); color:var(--gold); border:1px solid rgba(212,175,55,0.3); box-shadow:4px 4px 10px #000,-1px -1px 6px #2a1a00,inset 0 1px 0 rgba(212,175,55,0.1); font-size:22px; }
  .btn-op:active { box-shadow:0 0 20px rgba(212,175,55,0.5),inset 0 2px 5px rgba(0,0,0,0.5); }
  .btn-eq   { background:linear-gradient(145deg,var(--gold),var(--gold-dark)); color:var(--black); box-shadow:4px 4px 14px rgba(212,175,55,0.4); font-size:26px; }
  .btn-eq:active { box-shadow:0 0 30px rgba(212,175,55,0.8),inset 0 3px 8px rgba(0,0,0,0.3); }
  .btn-clr  { background:linear-gradient(145deg,#2A0A0A,#1A0505); color:#FF6666; border:1px solid rgba(255,80,80,0.2); box-shadow:4px 4px 10px #000; font-size:14px; }
  .btn-back { background:linear-gradient(145deg,#1A1200,#0F0C00); color:var(--gold); border:1px solid rgba(212,175,55,0.2); box-shadow:4px 4px 10px #000; font-size:20px; }
  .btn-pct  { background:linear-gradient(145deg,#0A1A0A,#051005); color:#44DD88; border:1px solid rgba(68,221,136,0.2); box-shadow:4px 4px 10px #000; }
  .btn-dot  { background:linear-gradient(145deg,#1E1E1E,#141414); color:var(--gold); box-shadow:4px 4px 10px #000; font-size:26px; }

  /* Ripple */
  .ripple { position:absolute; border-radius:50%; background:rgba(212,175,55,0.3); animation:ripple-anim 0.5s ease-out forwards; pointer-events:none; }
  @keyframes ripple-anim { from{width:0;height:0;opacity:.8;transform:translate(-50%,-50%);} to{width:100px;height:100px;opacity:0;transform:translate(-50%,-50%);} }

  /* ── Modal Base ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:100;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(6px);
  }
  .modal-overlay.show { opacity:1; pointer-events:all; }
  .modal {
    background:var(--black-card); border:1px solid rgba(212,175,55,0.4);
    border-radius:20px; padding:22px 18px; width:88%; max-width:370px;
    box-shadow:0 0 50px rgba(212,175,55,0.2),0 20px 60px rgba(0,0,0,0.8);
    transform:translateY(30px) scale(0.95); transition:transform 0.3s;
    position:relative; overflow:hidden; max-height:92vh; overflow-y:auto;
  }
  .modal::before { content:''; position:absolute; top:0; left:10%; right:10%; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .modal-overlay.show .modal { transform:translateY(0) scale(1); }

  .modal-title   { font-family:var(--f-display); color:var(--gold); font-size:16px; font-weight:700; text-align:center; margin-bottom:4px; letter-spacing:2px; }
  .modal-formula { font-size:10px; color:rgba(212,175,55,0.5); text-align:center; margin-bottom:16px; direction:ltr; font-family:var(--f-display); }

  .input-group { margin-bottom:12px; }
  .input-label { font-size:12px; color:rgba(212,175,55,0.7); margin-bottom:5px; display:block; text-align:right; }
  .modal-input {
    width:100%; background:var(--black); border:1px solid rgba(212,175,55,0.3);
    border-radius:10px; color:var(--gold); font-family:var(--f-display);
    font-size:18px; padding:10px 14px; text-align:right; outline:none; direction:ltr;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .modal-input:focus { border-color:var(--gold); box-shadow:0 0 15px rgba(212,175,55,0.2); }

  .modal-result { background:var(--black); border:1px solid rgba(212,175,55,0.2); border-radius:10px; padding:10px 14px; margin:12px 0; display:none; }
  .modal-result.show { display:block; }
  .modal-result-label { font-size:11px; color:rgba(212,175,55,0.5); text-align:right; margin-bottom:3px; }
  .modal-result-value { font-family:var(--f-display); font-size:22px; font-weight:700; color:var(--gold-light); text-align:right; text-shadow:0 0 20px rgba(212,175,55,0.6); }

  .modal-btns { display:flex; gap:10px; margin-top:6px; }
  .modal-btn  { flex:1; padding:12px; border-radius:12px; border:none; cursor:pointer; font-family:var(--f-display); font-size:12px; font-weight:700; letter-spacing:1px; transition:all 0.2s; }
  .modal-btn-calc  { background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:var(--black); box-shadow:0 4px 15px rgba(212,175,55,0.4); }
  .modal-btn-calc:active { transform:scale(0.96); }
  .modal-btn-close { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.1); }

  .modal-btn-use {
    display:none; width:100%; margin-top:8px; padding:11px; border-radius:12px;
    border:1px solid rgba(68,221,136,0.4); background:rgba(68,221,136,0.1); color:#44DD88;
    cursor:pointer; font-family:var(--f-display); font-size:11px; font-weight:700; letter-spacing:1px; transition:all 0.2s;
  }
  .modal-btn-use.show { display:block; }

  /* ── التحييف ── */
  .tahyeef-box { display:none; margin:10px 0; }
  .tahyeef-box.show { display:block; }
  .tahyeef-title {
    font-family:var(--f-display); font-size:11px; font-weight:700;
    color:rgba(212,175,55,0.6); text-align:center; margin-bottom:8px; letter-spacing:1px;
  }
  .tahyeef-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .tahyeef-item {
    border-radius:10px; padding:8px 6px; text-align:center; border:1px solid;
  }
  .tahyeef-item.copper-red  { background:rgba(180,60,30,0.12);  border-color:rgba(180,60,30,0.3);  }
  .tahyeef-item.silver      { background:rgba(180,190,200,0.08); border-color:rgba(180,190,200,0.25); }
  .tahyeef-item.brass       { background:rgba(180,150,30,0.1);   border-color:rgba(180,150,30,0.3);  }
  .tahyeef-name {
    font-family:var(--f-body); font-size:10px; font-weight:700;
    margin-bottom:1px; white-space:nowrap;
  }
  .copper-red .tahyeef-name { color:#E07050; }
  .silver     .tahyeef-name { color:#B0C0CC; }
  .brass      .tahyeef-name { color:#C8A830; }
  .tahyeef-pct { font-size:9px; opacity:0.45; margin-bottom:4px; font-family:var(--f-display); color:#fff; }
  .tahyeef-val {
    font-family:var(--f-display); font-size:12px; font-weight:700; word-break:break-all;
  }
  .copper-red .tahyeef-val { color:#E07050; }
  .silver     .tahyeef-val { color:#B0C0CC; }
  .brass      .tahyeef-val { color:#C8A830; }

  /* ── GT Modal (compact) ── */
  .gt-title   { font-family:var(--f-display); color:var(--green); font-size:15px; font-weight:700; text-align:center; margin-bottom:2px; letter-spacing:2px; }
  .gt-formula { font-size:9px; color:rgba(136,221,68,0.4); text-align:center; margin-bottom:10px; direction:ltr; font-family:var(--f-display); }

  .gt-input-row {
    background:rgba(136,221,68,0.04); border:1px solid rgba(136,221,68,0.15);
    border-radius:10px; padding:8px 10px; margin-bottom:8px;
  }
  .gt-op-label { font-size:10px; color:rgba(136,221,68,0.55); font-family:var(--f-display); margin-bottom:6px; text-align:center; letter-spacing:1px; }
  .gt-inputs-flex { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .gt-input-wrap { display:flex; flex-direction:column; gap:3px; align-items:center; }
  .gt-input-mini-label { font-size:9px; color:rgba(136,221,68,0.4); font-family:var(--f-display); }
  .gt-input {
    width:100%; background:var(--black); border:1px solid rgba(136,221,68,0.25);
    border-radius:8px; color:var(--green); font-family:var(--f-display);
    font-size:15px; padding:7px 8px; text-align:center; outline:none; direction:ltr;
    transition:border-color 0.2s;
  }
  .gt-input:focus { border-color:var(--green); box-shadow:0 0 8px rgba(136,221,68,0.2); }
  .gt-input::placeholder { color:rgba(136,221,68,0.2); font-size:12px; }
  .gt-input.err { border-color:#FF4444 !important; animation:shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

  .gt-add-btn {
    width:100%; padding:9px; border-radius:9px; border:1px solid rgba(136,221,68,0.3);
    background:rgba(136,221,68,0.08); color:var(--green); cursor:pointer;
    font-family:var(--f-display); font-size:11px; font-weight:700; letter-spacing:1px;
    transition:all 0.2s; margin-bottom:8px;
  }
  .gt-add-btn:active { background:rgba(136,221,68,0.2); transform:scale(0.97); }

  .gt-memory-wrap {
    background:var(--black); border:1px solid rgba(136,221,68,0.12);
    border-radius:9px; padding:8px; margin-bottom:8px;
    max-height:120px; overflow-y:auto; display:none;
  }
  .gt-memory-wrap.show { display:block; }
  .gt-memory-title { font-size:9px; color:rgba(136,221,68,0.4); font-family:var(--f-display); margin-bottom:5px; text-align:center; letter-spacing:1px; }

  .gt-mem-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:4px 2px; border-bottom:1px solid rgba(136,221,68,0.07);
    animation:slide-in 0.22s ease-out;
  }
  .gt-mem-item:last-child { border-bottom:none; }
  @keyframes slide-in { from{opacity:0;transform:translateX(8px);} to{opacity:1;transform:translateX(0);} }

  .gt-mem-left  { display:flex; flex-direction:column; align-items:flex-end; gap:1px; flex:1; }
  .gt-mem-label { font-size:8px; color:rgba(136,221,68,0.35); font-family:var(--f-display); direction:ltr; }
  .gt-mem-val   { font-size:12px; color:var(--green); font-family:var(--f-display); font-weight:700; }
  .gt-mem-del   { background:none; border:none; color:rgba(255,80,80,0.4); cursor:pointer; font-size:13px; padding:0 4px 0 8px; line-height:1; flex-shrink:0; }
  .gt-mem-del:active { color:#FF4444; }

  .gt-total-box { background:var(--black); border:1px solid rgba(212,175,55,0.25); border-radius:9px; padding:8px 12px; margin-bottom:8px; display:none; }
  .gt-total-box.show { display:block; }
  .gt-total-label { font-size:10px; color:rgba(212,175,55,0.5); text-align:right; margin-bottom:2px; }
  .gt-total-value { font-family:var(--f-display); font-size:22px; font-weight:700; color:var(--gold-light); text-align:right; text-shadow:0 0 20px rgba(212,175,55,0.7); animation:result-flash 0.4s ease-out; }

  .gt-action-row { display:grid; grid-template-columns:2fr 1fr; gap:7px; }
  .gt-final-btn {
    padding:10px; border-radius:10px; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:var(--black);
    font-family:var(--f-display); font-size:10px; font-weight:700; letter-spacing:1px;
    box-shadow:0 3px 12px rgba(212,175,55,0.3); transition:all 0.2s;
  }
  .gt-final-btn:active { transform:scale(0.96); box-shadow:0 0 20px rgba(212,175,55,0.7); }
  .gt-reset-btn {
    padding:10px; border-radius:10px; cursor:pointer;
    background:rgba(255,80,80,0.07); border:1px solid rgba(255,80,80,0.2);
    color:#FF6666; font-family:var(--f-display); font-size:10px; font-weight:700;
    transition:all 0.2s;
  }
  .gt-reset-btn:active { background:rgba(255,80,80,0.2); }
  .gt-use-btn {
    display:none; width:100%; margin-top:7px; padding:10px; border-radius:10px;
    border:1px solid rgba(68,221,136,0.4); background:rgba(68,221,136,0.1); color:#44DD88;
    cursor:pointer; font-family:var(--f-display); font-size:10px; font-weight:700;
    letter-spacing:1px; transition:all 0.2s;
  }
  .gt-use-btn.show { display:block; }
  .gt-use-btn:active { background:rgba(68,221,136,0.25); }

  .safe-bottom { height:env(safe-area-inset-bottom,10px); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(212,175,55,0.3); border-radius:2px; }
</style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="app">
  <div class="scanline"></div>

  <div class="header">
    <div class="app-title">BTC CALCULATOR</div>
  </div>

  <div class="display-wrap">
    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-num"  id="display">0</div>
    </div>
  </div>

  <!-- 4 special buttons -->
  <div class="special-row">
    <button class="special-btn"        onclick="openModal('gd21')">GD 21</button>
    <button class="special-btn"        onclick="openModal('gd5')">GD 5<br>BOUND</button>
    <button class="special-btn"        onclick="openModal('gd18')">GD 18</button>
    <button class="special-btn gt-btn" onclick="openGT()">GT</button>
  </div>

  <div class="keypad">
    <button class="btn btn-clr"  onclick="calcAction('ac')">AC</button>
    <button class="btn btn-back" onclick="calcAction('back')">⌫</button>
    <button class="btn btn-pct"  onclick="calcAction('%')">%</button>
    <button class="btn btn-op"   onclick="calcAction('÷')">÷</button>

    <button class="btn btn-num" onclick="calcAction('7')">7</button>
    <button class="btn btn-num" onclick="calcAction('8')">8</button>
    <button class="btn btn-num" onclick="calcAction('9')">9</button>
    <button class="btn btn-op"  onclick="calcAction('×')">×</button>

    <button class="btn btn-num" onclick="calcAction('4')">4</button>
    <button class="btn btn-num" onclick="calcAction('5')">5</button>
    <button class="btn btn-num" onclick="calcAction('6')">6</button>
    <button class="btn btn-op"  onclick="calcAction('-')">−</button>

    <button class="btn btn-num" onclick="calcAction('1')">1</button>
    <button class="btn btn-num" onclick="calcAction('2')">2</button>
    <button class="btn btn-num" onclick="calcAction('3')">3</button>
    <button class="btn btn-op"  onclick="calcAction('+')">+</button>

    <button class="btn btn-num btn-zero" onclick="calcAction('0')">0</button>
    <button class="btn btn-dot"          onclick="calcAction('.')">.</button>
    <button class="btn btn-eq"           onclick="calcAction('=')">=</button>
  </div>

  <div class="safe-bottom"></div>
</div>

<!-- Modal: GD 21 / GD 5 BOUND / GD 18 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title"   id="modal-title"></div>
    <div class="modal-formula" id="modal-formula"></div>
    <div class="input-group">
      <label class="input-label">⚖️ الوزن (جرام)</label>
      <input class="modal-input" id="input-weight" type="number" inputmode="decimal" placeholder="0.000" step="any">
    </div>
    <div class="input-group">
      <label class="input-label">🔢 العيار</label>
      <input class="modal-input" id="input-standard" type="number" inputmode="decimal" placeholder="0.000" step="any">
    </div>
    <div class="modal-result" id="modal-result">
      <div class="modal-result-label">النتيجة</div>
      <div class="modal-result-value" id="modal-result-value"></div>
    </div>

    <!-- التحييف -->
    <div class="tahyeef-box" id="tahyeef-box">
      <div class="tahyeef-title">⚗️ التحييف</div>
      <div class="tahyeef-grid">
        <div class="tahyeef-item copper-red">
          <div class="tahyeef-name">نحاس أحمر</div>
          <div class="tahyeef-pct">60%</div>
          <div class="tahyeef-val" id="t-copper-red">—</div>
        </div>
        <div class="tahyeef-item silver">
          <div class="tahyeef-name">فضة</div>
          <div class="tahyeef-pct">30%</div>
          <div class="tahyeef-val" id="t-silver">—</div>
        </div>
        <div class="tahyeef-item brass">
          <div class="tahyeef-name">نحاس أصفر</div>
          <div class="tahyeef-pct">10%</div>
          <div class="tahyeef-val" id="t-brass">—</div>
        </div>
      </div>
    </div>

    <div class="modal-btns">
      <button class="modal-btn modal-btn-calc"  onclick="calculateSpecial()">احسب</button>
      <button class="modal-btn modal-btn-close" onclick="closeModal()">إلغاء</button>
    </div>
    <button class="modal-btn-use" id="btn-use-result" onclick="useResult()">✓ استخدم النتيجة في الحاسبة</button>
  </div>
</div>

<!-- Modal: GT -->
<div class="modal-overlay" id="gt-modal">
  <div class="modal">
    <div class="gt-title">GT</div>
    <div class="gt-formula">( X × O ÷ 1000 ) → مجموع كل النواتج</div>

    <div class="gt-input-row">
      <div class="gt-op-label" id="gt-op-label">العملية #1</div>
      <div class="gt-inputs-flex">
        <div class="gt-input-wrap">
          <span class="gt-input-mini-label">X</span>
          <input class="gt-input" id="gt-x" type="number" inputmode="decimal" placeholder="0" step="any">
        </div>
        <div class="gt-input-wrap">
          <span class="gt-input-mini-label">O</span>
          <input class="gt-input" id="gt-o" type="number" inputmode="decimal" placeholder="0" step="any">
        </div>
      </div>
    </div>

    <button class="gt-add-btn" onclick="gtAddOperation()">＋ إضافة وحفظ في الذاكرة</button>

    <div class="gt-memory-wrap" id="gt-memory-wrap">
      <div class="gt-memory-title">الذاكرة</div>
      <div id="gt-memory-list"></div>
    </div>

    <div class="gt-total-box" id="gt-total-box">
      <div class="gt-total-label">المحصلة النهائية</div>
      <div class="gt-total-value" id="gt-total-value"></div>
    </div>

    <div class="gt-action-row">
      <button class="gt-final-btn" onclick="gtCalcTotal()">المحصلة النهائية</button>
      <button class="gt-reset-btn" onclick="gtReset()">مسح الكل</button>
    </div>
    <button class="modal-btn modal-btn-close" style="width:100%;margin-top:8px;" onclick="closeGT()">إغلاق</button>
    <button class="gt-use-btn" id="gt-use-btn" onclick="gtUseResult()">✓ استخدم المحصلة في الحاسبة</button>
  </div>
</div>

<script>
/* ── Particles ── */
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const sz = Math.random()*3+1;
  p.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz}px;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*15}s;`;
  particlesEl.appendChild(p);
}

/* ── Ripple helper ── */
function rippleOn(el) {
  el.addEventListener('click', function(e) {
    const r = document.createElement('div'); r.className = 'ripple';
    const rc = this.getBoundingClientRect();
    r.style.left = (e.clientX-rc.left)+'px'; r.style.top = (e.clientY-rc.top)+'px';
    this.appendChild(r); setTimeout(()=>r.remove(), 500);
  });
}
document.querySelectorAll('.btn,.special-btn,.modal-btn,.modal-btn-use,.gt-add-btn,.gt-final-btn,.gt-reset-btn,.gt-use-btn').forEach(rippleOn);

/* ════════════════ CALCULATOR ════════════════ */
let cur='0', prev='', op=null, justEq=false, freshStart=true;
const dispEl = document.getElementById('display');
const exprEl = document.getElementById('expr');

function fmtN(s) {
  if (!s || s==='-') return s;
  const neg = s[0]==='-'; const t = neg?s.slice(1):s;
  const [ip,dp] = t.split('.');
  const fi = ip.replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (neg?'-':'')+fi+(dp!==undefined?'.'+dp:'');
}
function updDisp(pop) {
  dispEl.textContent = fmtN(cur);
  if(pop){ dispEl.classList.remove('pop'); void dispEl.offsetWidth; dispEl.classList.add('pop'); }
}
function flashRes() { dispEl.classList.remove('result-anim'); void dispEl.offsetWidth; dispEl.classList.add('result-anim'); }
function pN(s) { return parseFloat(String(s).replace(/,/g,'')); }

function calcAction(v) {
  if (v==='ac') { cur='0';prev='';op=null;justEq=false;freshStart=true;exprEl.textContent='';updDisp(false);return; }
  if (v==='back') {
    if(justEq){cur='0';justEq=false;updDisp(false);return;}
    cur=(cur.length<=1||(cur.length===2&&cur[0]==='-'))?'0':cur.slice(0,-1);
    updDisp(true);return;
  }
  if (v==='%') { const n=parseFloat(cur);if(!isNaN(n)){cur=String(parseFloat((n/100).toPrecision(10)));updDisp(true);}return; }
  const isOp=['+','-','×','÷'].includes(v);
  if (isOp) {
    if(op&&!freshStart){cur=String(cmp(pN(prev),parseFloat(cur),op));flashRes();}
    prev=cur;op=v;freshStart=true;justEq=false;
    exprEl.textContent=fmtN(prev)+' '+v;updDisp(false);return;
  }
  if (v==='=') {
    if(!op)return;
    exprEl.textContent=fmtN(prev)+' '+op+' '+fmtN(cur)+' =';
    cur=String(cmp(pN(prev),parseFloat(cur),op));
    op=null;prev='';justEq=true;freshStart=true;flashRes();updDisp(false);return;
  }
  if(justEq){cur='0';justEq=false;exprEl.textContent='';}
  if(freshStart){cur='0';freshStart=false;}
  if(v==='.'){if(!cur.includes('.'))cur+='.';updDisp(true);return;}
  cur=cur==='0'?v:cur+v;
  if(cur.replace('-','').replace('.','').length>12)return;
  updDisp(true);
}
function cmp(a,b,o) {
  let r; if(o==='+')r=a+b; else if(o==='-')r=a-b; else if(o==='×')r=a*b; else if(o==='÷')r=b?a/b:0;
  return isNaN(r)?0:parseFloat(r.toPrecision(12));
}

/* ════════════════ GD MODALS ════════════════ */
const GD = {
  gd21: { title:'GD 21',      formula:'( Weight × Standard ÷ 872.50 ) − Weight', div:872.50 },
  gd5:  { title:'GD 5 BOUND', formula:'( Weight × Standard ÷ 875 ) − Weight',    div:875    },
  gd18: { title:'GD 18',      formula:'( Weight × Standard ÷ 750 ) − Weight',    div:750    },
};
let activeGD='gd21', lastGDRes=null;

// Smart format: no forced decimals, removes trailing zeros
function fmtResult(n) {
  if (isNaN(n)) return '0';
  // round to 10 significant digits to avoid float noise
  const rounded = parseFloat(n.toPrecision(10));
  // use up to 6 decimal places, strip trailing zeros
  let s = rounded.toFixed(6).replace(/\.?0+$/, '');
  // add thousands commas to integer part
  const [ip, dp] = s.split('.');
  const fi = ip.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return dp ? fi + '.' + dp : fi;
}

function openModal(m) {
  activeGD=m; lastGDRes=null;
  const cfg=GD[m];
  document.getElementById('modal-title').textContent=cfg.title;
  document.getElementById('modal-formula').textContent=cfg.formula;
  document.getElementById('input-weight').value='';
  document.getElementById('input-standard').value='';
  document.getElementById('modal-result').classList.remove('show');
  document.getElementById('tahyeef-box').classList.remove('show');
  document.getElementById('btn-use-result').classList.remove('show');
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('input-weight').focus(),300);
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function calculateSpecial() {
  const w=parseFloat(document.getElementById('input-weight').value);
  const s=parseFloat(document.getElementById('input-standard').value);
  if(isNaN(w)||isNaN(s)){
    document.getElementById('modal-result-value').textContent='⚠ أدخل القيم';
    document.getElementById('modal-result').classList.add('show');
    document.getElementById('tahyeef-box').classList.remove('show');
    return;
  }
  lastGDRes=(w*s/GD[activeGD].div)-w;
  document.getElementById('modal-result-value').textContent = fmtResult(lastGDRes);
  document.getElementById('modal-result').classList.add('show');

  // التحييف
  document.getElementById('t-copper-red').textContent = fmtResult(lastGDRes * 0.60);
  document.getElementById('t-silver').textContent     = fmtResult(lastGDRes * 0.30);
  document.getElementById('t-brass').textContent      = fmtResult(lastGDRes * 0.10);
  document.getElementById('tahyeef-box').classList.add('show');

  document.getElementById('btn-use-result').classList.add('show');
}
function useResult() {
  if(lastGDRes===null)return;
  cur=String(parseFloat(lastGDRes.toPrecision(12)));
  justEq=true;freshStart=true;op=null;prev='';
  exprEl.textContent='← '+GD[activeGD].title;
  flashRes();updDisp(false);closeModal();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

/* ════════════════ GT MODAL ════════════════ */
let gtMem=[], gtFinal=null;

function openGT() {
  document.getElementById('gt-modal').classList.add('show');
  renderGTMem();
  setTimeout(()=>document.getElementById('gt-x').focus(),300);
}
function closeGT(){ document.getElementById('gt-modal').classList.remove('show'); }

function gtAddOperation() {
  const xEl=document.getElementById('gt-x'), oEl=document.getElementById('gt-o');
  const x=parseFloat(xEl.value), o=parseFloat(oEl.value);
  if(isNaN(x)||isNaN(o)){
    if(isNaN(x)){xEl.classList.add('err');}
    if(isNaN(o)){oEl.classList.add('err');}
    setTimeout(()=>{xEl.classList.remove('err');oEl.classList.remove('err');},700);
    return;
  }
  gtMem.push({x,o,z:x*o/1000});
  xEl.value=''; oEl.value='';
  gtFinal=null;
  document.getElementById('gt-total-box').classList.remove('show');
  document.getElementById('gt-use-btn').classList.remove('show');
  renderGTMem();
  document.getElementById('gt-op-label').textContent='العملية #'+(gtMem.length+1);
  setTimeout(()=>xEl.focus(),80);
}

function gtDeleteItem(i) {
  gtMem.splice(i,1);
  gtFinal=null;
  document.getElementById('gt-total-box').classList.remove('show');
  document.getElementById('gt-use-btn').classList.remove('show');
  renderGTMem();
  document.getElementById('gt-op-label').textContent='العملية #'+(gtMem.length+1);
}

function renderGTMem() {
  const wrap=document.getElementById('gt-memory-wrap');
  const list=document.getElementById('gt-memory-list');
  if(gtMem.length===0){wrap.classList.remove('show');list.innerHTML='';return;}
  wrap.classList.add('show');
  list.innerHTML=gtMem.map((it,i)=>`
    <div class="gt-mem-item">
      <button class="gt-mem-del" onclick="gtDeleteItem(${i})">✕</button>
      <div class="gt-mem-left">
        <span class="gt-mem-label">${it.x} × ${it.o} ÷ 1000</span>
        <span class="gt-mem-val">Z${i+1} = ${fmtResult(it.z)}</span>
      </div>
    </div>`).join('');
}

function gtCalcTotal() {
  if(!gtMem.length)return;
  gtFinal=gtMem.reduce((s,it)=>s+it.z,0);
  document.getElementById('gt-total-value').textContent = fmtResult(gtFinal);
  document.getElementById('gt-total-box').classList.add('show');
  document.getElementById('gt-use-btn').classList.add('show');
}

function gtReset() {
  gtMem=[];gtFinal=null;
  document.getElementById('gt-x').value='';
  document.getElementById('gt-o').value='';
  document.getElementById('gt-op-label').textContent='العملية #1';
  document.getElementById('gt-total-box').classList.remove('show');
  document.getElementById('gt-use-btn').classList.remove('show');
  renderGTMem();
}

function gtUseResult() {
  if(gtFinal===null)return;
  cur=String(parseFloat(gtFinal.toPrecision(12)));
  justEq=true;freshStart=true;op=null;prev='';
  exprEl.textContent='← GT';
  flashRes();updDisp(false);closeGT();
}
document.getElementById('gt-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeGT();});

/* ════════════════ KEYBOARD SUPPORT ════════════════ */

/* ── Main calculator keyboard ── */
document.addEventListener('keydown', function(e) {
  // Don't fire if a modal is open or user is in an input
  if (document.querySelector('.modal-overlay.show')) return;
  if (e.target.tagName === 'INPUT') return;

  const k = e.key;
  if (k >= '0' && k <= '9')            { calcAction(k); return; }
  if (k === '.' || k === ',')           { calcAction('.'); return; }
  if (k === '+')                        { calcAction('+'); return; }
  if (k === '-')                        { calcAction('-'); return; }
  if (k === '*')                        { calcAction('×'); return; }
  if (k === '/')                        { e.preventDefault(); calcAction('÷'); return; }
  if (k === '%')                        { calcAction('%'); return; }
  if (k === 'Enter' || k === '=')       { calcAction('='); return; }
  if (k === 'Backspace')                { calcAction('back'); return; }
  if (k === 'Escape' || k === 'Delete') { calcAction('ac'); return; }
});

/* ── GD Modal keyboard: weight → [Enter] → standard → [Enter] → calculate → [Enter] → close ── */
document.getElementById('input-weight').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('input-standard').focus(); }
});
document.getElementById('input-standard').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); calculateSpecial(); }
});

/* ── GT Modal keyboard ── */
// X → Enter → O
document.getElementById('gt-x').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('gt-o').focus(); }
});

// O → Enter:
//   • if both fields filled → add operation & go back to X
//   • if both fields EMPTY → trigger final total (second-Enter logic)
let gtEmptyEnterCount = 0;
document.getElementById('gt-o').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') { gtEmptyEnterCount = 0; return; }
  e.preventDefault();
  const xVal = document.getElementById('gt-x').value.trim();
  const oVal = document.getElementById('gt-o').value.trim();

  if (xVal !== '' && oVal !== '') {
    // both filled → add
    gtEmptyEnterCount = 0;
    gtAddOperation();
    return;
  }

  if (xVal === '' && oVal === '') {
    // empty → first Enter moves focus to X and counts; second Enter → total
    gtEmptyEnterCount++;
    if (gtEmptyEnterCount >= 2) {
      gtEmptyEnterCount = 0;
      if (gtMem.length > 0) gtCalcTotal();
    } else {
      document.getElementById('gt-x').focus();
    }
    return;
  }

  // one field filled, one empty → just validate normally
  gtEmptyEnterCount = 0;
  gtAddOperation();
});

/* reset empty-enter counter when user types in GT inputs */
['gt-x','gt-o'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { gtEmptyEnterCount = 0; });
});

/* ── Init ── */
updDisp(false);
</script>
</body>
</html>
